<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>林曉亞 Ya-Ya｜CHAI中華AI新聞</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#050a14;color:#e8f4ff;font-family:system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}.hdr{width:100%;background:linear-gradient(90deg,#0a1628,#0d2040);border-bottom:2px solid #c8a43a;padding:12px 24px;display:flex;align-items:center;justify-content:space-between}.brand{font-size:13px;color:#c8a43a;letter-spacing:.15em;font-weight:700}.live{background:#c00;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:3px;animation:blink 1.5s infinite}@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}.ticker-w{background:#c8a43a;padding:6px 0;overflow:hidden;width:100%}.ticker{display:inline-block;white-space:nowrap;animation:tick 30s linear infinite;font-size:13px;font-weight:700;color:#050a14;padding-left:100%}@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-100%)}}.main{width:100%;max-width:800px;padding:24px 16px;display:flex;flex-direction:column;gap:24px}.anc{display:flex;gap:20px;align-items:flex-start}.av-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:10px}.av{width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,#1a3a6a,#0d2040);border:3px solid #c8a43a;display:flex;align-items:center;justify-content:center;font-size:50px;box-shadow:0 0 30px rgba(200,164,58,.3)}.av.sp{animation:pg .6s ease-in-out infinite alternate}@keyframes pg{from{box-shadow:0 0 20px rgba(200,164,58,.3)}to{box-shadow:0 0 40px rgba(200,164,58,.7)}}.an{font-size:14px;font-weight:700;color:#c8a43a}.at{font-size:11px;color:#6a8aaa;letter-spacing:.08em}.np{flex:1}.nh{font-size:17px;font-weight:700;line-height:1.5;color:#fff;margin-bottom:12px;border-left:3px solid #c8a43a;padding-left:12px}.nb{font-size:14px;line-height:1.9;color:#b0c8e0}.ctrl{display:flex;gap:12px;flex-wrap:wrap}.btn{padding:10px 20px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}.bp{background:#c8a43a;color:#050a14}.bp:hover{background:#e0b84a}.bs{background:#0a1e40;color:#c8a43a;border:1px solid #c8a43a}.btn:disabled{opacity:.4;cursor:not-allowed}.st{font-size:12px;color:#4a7aaa;display:flex;align-items:center;gap:6px;margin-top:8px}.sd{width:8px;height:8px;border-radius:50%;background:#0c6}.nl{display:flex;flex-direction:column;gap:12px}.ni{background:#0a1628;border:1px solid #1a3a5a;border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .2s;display:flex;gap:12px;align-items:flex-start}.ni:hover,.ni.act{border-color:#c8a43a;background:#0d1f3a}.nn{font-size:11px;color:#c8a43a;font-weight:700;min-width:24px;margin-top:2px}.nt{font-size:14px;font-weight:700;color:#e0f0ff;margin-bottom:4px}.np2{font-size:12px;color:#6a8aaa;line-height:1.5}.ft{font-size:11px;color:#2a4a6a;text-align:center;padding:20px;letter-spacing:.08em}</style></head><body><div class="hdr"><div class="brand">CHAI中華AI｜雲林新聞中心</div><div class="live">● LIVE</div></div><div class="ticker-w"><span class="ticker">【即時】CHAI中華AI新聞正式開播｜林曉亞主播為您報導今日重要新聞｜點擊新聞項目聆聽播報</span></div><div class="main"><div class="anc"><div class="av-wrap"><div class="av" id="av">🎙️</div><div class="an">林曉亞</div><div class="at">Ya-Ya · AI主播</div></div><div class="np"><div class="nh" id="nh">歡迎收看 CHAI 中華AI新聞</div><div class="nb" id="nb">您好，我是林曉亞。請點選下方新聞項目，我將為您進行播報。</div></div></div><div class="ctrl"><button class="btn bp" onclick="play()">▶ 播報</button><button class="btn bs" id="sb" onclick="stop()" disabled>■ 停止</button></div><div class="st" id="st"><div class="sd"></div><span>系統就緒，請選擇新聞</span></div><div class="nl" id="nl"></div></div><div class="ft">CHAI中華AI｜中華時報雲林辦事處｜林曉亞 Ya-Ya © 2025</div><script>const N=[{t:"雲林縣推動AI智慧農業，協助農民提升產銷效率",b:"雲林縣政府宣布與科技業者合作推動智慧農業計畫，導入AI技術協助農民進行精準施肥與病蟲害預測。預計可提升農業產值逾三成。"},{t:"台灣AI產業規模持續擴大，新創公司數量創歷史新高",b:"台灣AI相關新創公司數量突破五百家，涵蓋醫療AI、製造業自動化與媒體科技等領域。"},{t:"虛擬主播技術進步，媒體業廣泛應用AI播報",b:"國內多家媒體引進AI虛擬主播，24小時不間斷提供即時新聞，支援普通話、台語、英語多語播報。"},{t:"中華時報雲林辦事處推出CHAI中華AI新聞平台",b:"林曉亞虛擬主播負責每日新聞播報，持續擴充在地新聞內容，服務雲林鄉親。"},{t:"著作權局強化數位內容保護，AI作品納入保障",b:"凡經人工創意介入具原創性的AI生成作品，均可依法申請著作權保護。"}];let ci=0;function r(){document.getElementById('nl').innerHTML=N.map((n,i)=>`<div class="ni${i===0?\' act\':\'\'}" id="i${i}" onclick="sel(${i})"><div class="nn">0${i+1}</div><div><div class="nt">${n.t}</div><div class="np2">${n.b.substring(0,35)}...</div></div></div>`).join('')}function sel(i){stop();ci=i;document.querySelectorAll('.ni').forEach(e=>e.classList.remove('act'));document.getElementById('i'+i).classList.add('act');document.getElementById('nh').textContent=N[i].t;document.getElementById('nb').textContent=N[i].b;document.getElementById('st').innerHTML='<div class="sd"></div><span>已選擇，按播報開始</span>'}function play(){if(!window.speechSynthesis)return;stop();const u=new SpeechSynthesisUtterance(N[ci].t+'。'+N[ci].b);u.lang='zh-TW';u.rate=.95;const vs=speechSynthesis.getVoices();const v=vs.find(x=>x.lang.includes('zh-TW'))||vs.find(x=>x.lang.includes('zh'));if(v)u.voice=v;u.onstart=()=>{document.getElementById('av').classList.add('sp');document.querySelector('.bp').disabled=true;document.getElementById('sb').disabled=false;document.getElementById('st').innerHTML='<div class="sd" style="background:#fa0"></div><span>林曉亞播報中...</span>'};u.onend=()=>{document.getElementById('av').classList.remove('sp');document.querySelector('.bp').disabled=false;document.getElementById('sb').disabled=true;document.getElementById('st').innerHTML='<div class="sd"></div><span>播報完畢</span>'};speechSynthesis.speak(u)}function stop(){speechSynthesis.cancel();document.getElementById('av').classList.remove('sp');document.querySelector('.bp').disabled=false;document.getElementById('sb').disabled=true}r();sel(0)</script></body></html>
